name: Nightly E2E

on:
  schedule:
    - cron: "0 2 * * *"
  workflow_dispatch:

jobs:
  lark-cli-smoke:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install Python deps
        run: pip install -e ".[dev]"

      - name: Install lark-cli
        run: npm install -g @larksuite/cli

      - name: Run integration smoke
        run: python -m pytest tests/integration/test_lark_cli_optional.py -q
